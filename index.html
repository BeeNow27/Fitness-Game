<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a1a1a%22/><text y=%22.9em%22 font-size=%2280%22 x=%2250%%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>💎</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a1a1a%22/><text y=%22.9em%22 font-size=%2280%22 x=%2250%%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>💎</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Loot Quest v9</title>
    <style>
        :root {
            --trainer: #888888; --food: #a2f2a2; --sport: #ffb347; --gym: #bf77f6;
            --mc-bg: #1a1a1a; --mc-xp: #3cf03c; --shield: #00e5ff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--mc-bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .streak-counter { font-size: 1.5rem; margin-bottom: 5px; color: #ff4500; font-weight: bold; text-shadow: 0 0 10px #ff4500; }
        
        .lvl-1 { color: var(--trainer); }
        .lvl-5 { color: var(--food); text-shadow: 0 0 10px var(--food); }
        .lvl-10 { color: var(--sport); text-shadow: 0 0 10px var(--sport); }
        .lvl-20 { color: var(--gym); text-shadow: 0 0 15px var(--gym); animation: enchant 3s infinite; }

        .xp-bar-outer { width: 100%; height: 25px; background: #000; border: 3px solid #555; border-radius: 5px; overflow: hidden; position: relative; }
        #xp-inner { height: 100%; width: 0%; background: var(--mc-xp); transition: 0.4s; box-shadow: 0 0 10px var(--mc-xp); }

        .card { background: #2a2a2a; border-radius: 15px; padding: 15px; width: 100%; max-width: 400px; margin-bottom: 15px; border: 1px solid #444; box-sizing: border-box; }
        h2 { margin: 0 0 10px 0; font-size: 0.9rem; color: #666; text-transform: uppercase; }

        .quest { padding: 14px; border-radius: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; position: relative; overflow: hidden; transition: transform 0.1s; }
        .quest:active { transform: scale(0.95); }
        
        .trainer { background: rgba(136, 136, 136, 0.1); color: var(--trainer); border-color: var(--trainer); }
        .food { background: rgba(162, 242, 162, 0.1); color: var(--food); border-color: var(--food); }
        .sport { background: rgba(255, 179, 71, 0.1); color: var(--sport); border-color: var(--sport); }
        .gym { background: rgba(191, 119, 246, 0.2); color: var(--gym); border-color: var(--gym); animation: enchant 3s linear infinite; }
        .shield-q { background: rgba(0, 229, 255, 0.15); color: var(--shield); border-color: var(--shield); border-style: dashed; }
        
        @keyframes enchant { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .completed { filter: grayscale(1) opacity(0.2) !important; animation: none !important; border-style: dotted; }

        .roll-btn { background: var(--mc-xp); color: black; border: none; padding: 15px 30px; font-weight: bold; border-radius: 8px; font-size: 1.1rem; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 4px 0 #28a428; }
        .roll-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #28a428; }
        .settings-btn { background: #333; color: #888; border: none; padding: 12px; border-radius: 8px; width: 100%; max-width: 400px; margin-top: 10px; }
        
        #loot-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="streak-counter">🔥 <span id="streak-num">0</span> DNÍ</div>
        <div id="lvl-label" class="lvl-1" style="font-weight: bold; font-size: 1.5rem; letter-spacing: 2px;">LVL <span id="lvl">1</span></div>
        <div class="xp-bar-outer"><div id="xp-inner"></div></div>
        <p>XP: <span id="xp-num">0</span> / 300</p>
        <button id="claim-btn" class="roll-btn" style="display:none;" onclick="showLoot()">✨ OTEVŘÍT LOOT BOX!</button>
    </div>

    <div class="card">
        <h2 id="today-name">DNES</h2>
        <div id="today-quests"></div>
    </div>

    <button class="settings-btn" onclick="toggleSettings()">⚙️ NASTAVENÍ & ŠTÍT</button>

    <div id="planner" class="card" style="display:none;">
        <div id="shield-section" style="text-align:center; padding: 10px; border: 1px solid var(--shield); border-radius: 10px; margin-bottom: 20px;">
            <p style="color:var(--shield); margin:0; font-size: 0.8rem;">🛡️ OCHRANNÝ ŠTÍT</p>
            <p style="font-size: 0.7rem; color: #aaa;">Cena: 5 plamínků</p>
            <button id="buy-shield-btn" class="roll-btn" style="background:var(--shield); font-size: 0.9rem; box-shadow: 0 4px 0 #0097a7;" onclick="activateShield()">AKTIVOVAT ŠTÍT</button>
        </div>
        <h2>Týdenní Plán</h2>
        <div id="planner-list"></div>
        <button class="roll-btn" style="margin-top:15px;" onclick="savePlan()">ULOŽIT</button>
    </div>

    <div id="loot-overlay">
        <div style="text-align:center; background:#222; padding:40px; border-radius:20px; border:4px solid var(--gym);">
            <h1 id="roll-status" style="color:var(--gym)">Loot!</h1>
            <div id="reward-display" style="font-size: 2rem; margin: 20px 0;">❓</div>
            <button id="spin-btn" class="roll-btn" onclick="spinWheel()">LOSOVAT!</button>
            <button id="close-btn" class="settings-btn" style="display:none;" onclick="location.reload()">ZPĚT</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitnessAppV9')) || {
            xp: 0, level: 1, streak: 0, lastDate: "", completedQuests: [], 
            plan: { 0:['F'], 1:['T','F','G'], 2:['F','S'], 3:['T','F'], 4:['F','G'], 5:['T','F'], 6:['S'] }
        };

        const questTypes = { 
            'T': {name:'Trénink',xp:10,class:'trainer'}, 
            'F': {name:'Jídlo',xp:20,class:'food'}, 
            'S': {name:'Sport',xp:50,class:'sport'}, 
            'G': {name:'Fitko',xp:80,class:'gym'},
            'SHIELD': {name:'🛡️ ŠTÍT AKTIVNÍ',xp:0,class:'shield-q'}
        };

        // AUDIO ENGINE - Minecraft Sounds
        const sounds = {
            click: new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3"),
            glass: new Audio("https://assets.mixkit.co/active_storage/sfx/2569/2569-preview.mp3"), // "Glass Break" style
            levelUp: new Audio("https://www.myinstants.com/media/sounds/minecraft-level-up-sound.mp3"),
            roll: new Audio("https://www.soundjay.com/buttons/sounds/button-20.mp3")
        };

        // Preload sounds
        Object.values(sounds).forEach(s => { s.load(); s.volume = 0.5; });

        function init() {
            checkStreak();
            const today = new Date().getDay();
            document.getElementById('today-name').textContent = "DNES (" + ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'][today] + ")";
            renderQuests();
            updateUI();
            buildPlanner();
        }

        function checkStreak() {
            const todayStr = new Date().toLocaleDateString();
            if (state.lastDate && state.lastDate !== todayStr) {
                const lastDate = new Date(state.lastDate);
                const diff = (new Date() - lastDate) / (1000 * 60 * 60 * 24);
                if (diff > 1.8) state.streak = 0;
            }
        }

        function toggleQuest(pts, el, id) {
            const todayStr = new Date().toLocaleDateString();
            
            if (state.completedQuests.includes(id)) {
                sounds.click.currentTime = 0; sounds.click.play();
                state.xp -= pts;
                state.completedQuests = state.completedQuests.filter(i => i !== id);
                el.classList.remove('completed');
                if (!state.completedQuests.some(cid => cid.startsWith(todayStr))) {
                    if (state.streak > 0) state.streak--;
                    state.lastDate = "";
                }
            } else {
                // MC Glass Break Sound
                sounds.glass.currentTime = 0; sounds.glass.play();
                state.xp += pts;
                state.completedQuests.push(id);
                el.classList.add('completed');
                if (state.lastDate !== todayStr) {
                    state.streak++;
                    state.lastDate = todayStr;
                }
            }
            save(); updateUI();
        }

        function activateShield() {
            if (state.streak < 5) { alert("Potřebuješ aspoň 5 plamínků!"); return; }
            const todayStr = new Date().toLocaleDateString();
            if (state.lastDate === todayStr) { alert("Dnes už máš splněno!"); return; }
            
            // MC Level Up Sound (Cinkání)
            sounds.levelUp.play();
            
            state.streak -= 5;
            state.lastDate = todayStr;
            state.completedQuests.push(`${todayStr}-${new Date().getDay()}-SHIELD`);
            save(); 
            setTimeout(() => location.reload(), 1000);
        }

        function updateUI() {
            document.getElementById('xp-inner').style.width = Math.min(100, (state.xp / 3)) + "%";
            document.getElementById('xp-num').textContent = state.xp;
            document.getElementById('lvl').textContent = state.level;
            document.getElementById('streak-num').textContent = state.streak;
            document.getElementById('claim-btn').style.display = state.xp >= 300 ? 'block' : 'none';
            const lbl = document.getElementById('lvl-label');
            lbl.className = state.level >= 20 ? 'lvl-20' : state.level >= 10 ? 'lvl-10' : state.level >= 5 ? 'lvl-5' : 'lvl-1';
        }

        function renderQuests() {
            const container = document.getElementById('today-quests');
            container.innerHTML = '';
            const today = new Date().getDay();
            const todayStr = new Date().toLocaleDateString();
            
            (state.plan[today] || []).forEach(key => {
                const q = questTypes[key];
                const div = document.createElement('div');
                div.className = `quest ${q.class}`;
                const qId = `${todayStr}-${today}-${key}`;
                if (state.completedQuests.includes(qId)) div.classList.add('completed');
                div.innerHTML = `<span>${q.name}</span><span>+${q.xp} XP</span>`;
                div.onclick = () => toggleQuest(q.xp, div, qId);
                container.appendChild(div);
            });

            if (state.completedQuests.includes(`${todayStr}-${today}-SHIELD`)) {
                const div = document.createElement('div');
                div.className = `quest shield-q completed`;
                div.innerHTML = `<span>🛡️ ŠTÍT AKTIVNÍ</span><span>0 XP</span>`;
                container.appendChild(div);
            }
        }

        function buildPlanner() {
            const list = document.getElementById('planner-list'); list.innerHTML = '';
            ['Ne', 'Po', 'Út', 'St', 'Čt', 'Pá', 'So'].forEach((day, i) => {
                let html = `<div style="margin-bottom:10px;"><small>${day}</small><div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">`;
                for (let key in questTypes) {
                    if (key === 'SHIELD') continue;
                    const isChecked = state.plan[i].includes(key) ? 'checked' : '';
                    html += `<div style="background:#333; padding:5px; border-radius:5px; font-size:0.7rem;"><input type="checkbox" id="d${i}${key}" ${isChecked}><label for="d${i}${key}">${questTypes[key].name}</label></div>`;
                }
                list.innerHTML += html + `</div></div>`;
            });
        }

        function savePlan() {
            [0,1,2,3,4,5,6].forEach(i => {
                const dayQ = [];
                for (let key in questTypes) { if (key !== 'SHIELD' && document.getElementById(`d${i}${key}`).checked) dayQ.push(key); }
                state.plan[i] = dayQ;
            });
            save(); location.reload();
        }

        function spinWheel() {
            sounds.roll.play();
            document.getElementById('spin-btn').style.display = 'none';
            const display = document.getElementById('reward-display');
            let count = 0;
            const itv = setInterval(() => { display.textContent = ["🥤 Kofola", "🍫 Čoko", "🍿 Popcorn", "❌ Nic"][count % 4]; count++; }, 100);
            setTimeout(() => {
                clearInterval(itv);
                sounds.levelUp.play();
                display.textContent = ["🥤 Kofola", "🍫 Čoko", "🍿 Popcorn", "❌ Nic"][Math.floor(Math.random() * 4)];
                document.getElementById('close-btn').style.display = 'block';
                state.xp -= 300; state.level++; save();
            }, 2000);
        }

        function toggleSettings() { const p = document.getElementById('planner'); p.style.display = p.style.display==='block'?'none':'block'; }
        function showLoot() { document.getElementById('loot-overlay').style.display = 'flex'; }
        function save() { localStorage.setItem('fitnessAppV9', JSON.stringify(state)); }
        init();
    </script>
</body>
</html>
