<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Loot Quest v6</title>
    <style>
        :root {
            --trainer: #888888;  /* Šedá */
            --food: #a2f2a2;     /* Světle zelená */
            --sport: #ffb347;    /* Oranžová */
            --gym: #bf77f6;      /* Světle fialová */
            --mc-bg: #1a1a1a; 
            --mc-xp: #3cf03c;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--mc-bg); color: white;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        /* XP BAR & HEADER */
        .header { width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .xp-bar-outer {
            width: 100%; height: 25px; background: #000; border: 3px solid #555;
            border-radius: 5px; overflow: hidden; position: relative;
        }
        #xp-inner { height: 100%; width: 0%; background: var(--mc-xp); transition: 0.4s; box-shadow: 0 0 10px var(--mc-xp); }
        .level-label { color: var(--mc-xp); font-weight: bold; font-size: 1.5rem; text-shadow: 2px 2px #000; letter-spacing: 2px; }

        .card {
            background: #2a2a2a; border-radius: 15px; padding: 15px;
            width: 100%; max-width: 400px; margin-bottom: 15px; border: 1px solid #444; box-sizing: border-box;
        }
        h2 { margin: 0 0 10px 0; font-size: 0.9rem; color: #666; text-transform: uppercase; }

        /* QUEST STYLES */
        .quest {
            padding: 14px; border-radius: 10px; margin: 10px 0;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
            position: relative; overflow: hidden;
        }
        .trainer { background: rgba(136, 136, 136, 0.1); color: var(--trainer); border-color: var(--trainer); }
        .food { background: rgba(162, 242, 162, 0.1); color: var(--food); border-color: var(--food); }
        .sport { background: rgba(255, 179, 71, 0.1); color: var(--sport); border-color: var(--sport); }
        
        /* ENCHANTED GYM EFFECT */
        .gym { 
            background: rgba(191, 119, 246, 0.2); color: var(--gym); border-color: var(--gym);
            background-image: linear-gradient(135deg, rgba(191, 119, 246, 0) 30%, rgba(255,255,255,0.4) 50%, rgba(191, 119, 246, 0) 70%);
            background-size: 200% 100%;
            animation: enchant 3s linear infinite;
        }
        @keyframes enchant {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .completed { filter: grayscale(1) opacity(0.2) !important; animation: none !important; border-style: dotted; }

        /* SETTINGS & PLANNER */
        .check-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .check-item {
            padding: 8px; border-radius: 6px; font-size: 0.75rem; border: 1px solid #444;
            display: flex; align-items: center; background: #333;
        }
        .check-item input { margin-right: 8px; transform: scale(1.2); }
        
        /* COLORS FOR PLANNER */
        .p-trainer { border-left: 4px solid var(--trainer); }
        .p-food { border-left: 4px solid var(--food); }
        .p-sport { border-left: 4px solid var(--sport); }
        .p-gym { border-left: 4px solid var(--gym); font-style: italic; }

        /* LOOT OVERLAY */
        #loot-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center;
        }
        .reward-box { padding: 40px; border: 4px solid var(--gym); border-radius: 20px; text-align: center; background: #1a1a1a; width: 80%; }
        .roll-btn { background: var(--mc-xp); color: black; border: none; padding: 15px 30px; font-weight: bold; border-radius: 8px; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 0 #28a428; }
        .roll-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #28a428; }
        .settings-btn { background: #333; color: #888; border: none; padding: 12px; border-radius: 8px; width: 100%; max-width: 400px; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="level-label">LVL <span id="lvl">1</span></div>
        <div class="xp-bar-outer"><div id="xp-inner"></div></div>
        <p style="font-weight: bold;">XP: <span id="xp-num">0</span> / 300</p>
        <button id="claim-btn" class="roll-btn" style="display:none; width: 100%;" onclick="showLoot()">✨ ROZBALIT LOOT BOX!</button>
    </div>

    <div class="card">
        <h2 id="today-name">DNES</h2>
        <div id="today-quests"></div>
    </div>

    <div class="card" style="opacity: 0.4;">
        <h2 id="tomorrow-name">ZÍTRA</h2>
        <div id="tomorrow-quests"></div>
    </div>

    <button class="settings-btn" onclick="toggleSettings()">⚙️ UPRAVIT TÝDENNÍ PLÁN</button>

    <div id="planner" class="card" style="display:none;">
        <h2 style="color: #fff;">Nastavení Questů</h2>
        <div id="planner-list"></div>
        <button class="roll-btn" style="width:100%; margin-top:15px;" onclick="savePlan()">ULOŽIT ZMĚNY</button>
    </div>

    <div id="loot-overlay">
        <div class="reward-box">
            <h2 id="roll-status" style="color: var(--gym);">Legendární Loot!</h2>
            <div id="reward-display" style="font-size: 1.8rem; margin: 30px 0; min-height: 50px;">📦 ???</div>
            <button id="spin-btn" class="roll-btn" onclick="spinWheel()">LOSOVAT!</button>
            <button id="close-btn" class="settings-btn" style="display:none;" onclick="closeLoot()">ZPĚT DO HRY</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitnessAppV6')) || {
            xp: 0, level: 1, completedQuests: [], 
            plan: { 0:['F'], 1:['T','F','G'], 2:['F','S'], 3:['T','F'], 4:['F','G'], 5:['T','F'], 6:['S'] }
        };

        const questTypes = {
            'T': { name: 'Trénink (Coach)', xp: 10, class: 'trainer' },
            'F': { name: 'Zdravé jídlo', xp: 20, class: 'food' },
            'S': { name: 'Sport / Běh', xp: 50, class: 'sport' },
            'G': { name: 'Posilovna (Ench)', xp: 80, class: 'gym' }
        };

        const rewards = ["🥤 Kofola", "🍫 Čokoláda", "🍿 Popcorn", "❌ Nic (Smůla!)"];
        const days = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];

        function init() {
            const today = new Date().getDay();
            const tomorrow = (today + 1) % 7;
            document.getElementById('today-name').textContent = "DNES (" + days[today] + ")";
            document.getElementById('tomorrow-name').textContent = "ZÍTRA (" + days[tomorrow] + ")";
            renderQuests('today-quests', today, true);
            renderQuests('tomorrow-quests', tomorrow, false);
            updateUI();
            buildPlanner();
        }

        function renderQuests(containerId, dayIdx, interactive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            (state.plan[dayIdx] || []).forEach(key => {
                const q = questTypes[key];
                const div = document.createElement('div');
                div.className = `quest ${q.class}`;
                const qId = `${new Date().toLocaleDateString()}-${dayIdx}-${key}`;
                if (state.completedQuests.includes(qId)) div.classList.add('completed');
                div.innerHTML = `<span>${q.name}</span><span>+${q.xp} XP</span>`;
                if (interactive) div.onclick = () => toggleQuest(q.xp, div, qId);
                container.appendChild(div);
            });
        }

        function toggleQuest(pts, el, id) {
            if (state.completedQuests.includes(id)) {
                state.xp -= pts;
                state.completedQuests = state.completedQuests.filter(i => i !== id);
                el.classList.remove('completed');
            } else {
                state.xp += pts;
                state.completedQuests.push(id);
                el.classList.add('completed');
            }
            save(); updateUI();
        }

        function updateUI() {
            document.getElementById('xp-inner').style.width = Math.min(100, (state.xp / 3)) + "%";
            document.getElementById('xp-num').textContent = state.xp;
            document.getElementById('lvl').textContent = state.level;
            document.getElementById('claim-btn').style.display = state.xp >= 300 ? 'block' : 'none';
        }

        function buildPlanner() {
            const list = document.getElementById('planner-list'); list.innerHTML = '';
            days.forEach((day, i) => {
                let html = `<div style="margin-bottom:12px;"><small>${day}</small><div class="check-group">`;
                for (let key in questTypes) {
                    const q = questTypes[key];
                    const isChecked = state.plan[i].includes(key) ? 'checked' : '';
                    html += `<div class="check-item p-${q.class}"><input type="checkbox" id="d${i}${key}" value="${key}" ${isChecked}><label for="d${i}${key}">${q.xp}XP</label></div>`;
                }
                list.innerHTML += html + `</div></div>`;
            });
        }

        function savePlan() {
            days.forEach((_, i) => {
                const dayQ = [];
                for (let key in questTypes) { if (document.getElementById(`d${i}${key}`).checked) dayQ.push(key); }
                state.plan[i] = dayQ;
            });
            save(); location.reload();
        }

        function showLoot() { document.getElementById('loot-overlay').style.display = 'flex'; }
        function spinWheel() {
            const btn = document.getElementById('spin-btn'); btn.style.display = 'none';
            const display = document.getElementById('reward-display');
            let count = 0;
            const itv = setInterval(() => { display.textContent = rewards[count % rewards.length]; count++; }, 800/rewards.length);
            setTimeout(() => {
                clearInterval(itv);
                display.textContent = rewards[Math.floor(Math.random() * rewards.length)];
                document.getElementById('close-btn').style.display = 'block';
                state.xp -= 300; state.level++; save();
            }, 2000);
        }

        function toggleSettings() { const p = document.getElementById('planner'); p.style.display = p.style.display==='block'?'none':'block'; }
        function closeLoot() { location.reload(); }
        function save() { localStorage.setItem('fitnessAppV6', JSON.stringify(state)); }
        init();
    </script>
</body>
</html>
